# Xtext/EMF use log4j 1.2 (via reload4j). EMF's Diagnostician logs a
# MissingResourceException for _UI_DiagnosticRoot_diagnostic on every
# validation run because the resource bundle from org.eclipse.emf.ecore.edit
# isn't bundled (its older EMF deps conflict with Xtext 2.36). The lookup
# failure is harmless — validation still produces the right diagnostics —
# so we just mute the noisy logger.
log4j.rootLogger=WARN, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%-5p %c{2} - %m%n

# Mute the specific logger that prints the missing-resource stack trace.
log4j.logger.org.eclipse.xtext.validation.ResourceValidatorImpl=OFF
log4j.logger.org.eclipse.emf.common.util.DelegatingResourceLocator=OFF
